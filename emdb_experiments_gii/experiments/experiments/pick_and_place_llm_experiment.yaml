Experiment:
    name: main_loop
    class_name: cognitive_processes.main_loop.MainLoop
    new_executor: True
    threads: 2
    parameters: 
        iterations: 6000
        trials: 50
        subgoals: False

Control:
    id: pick_and_place_simulator
    control_topic: /main_loop/control
    control_msg: cognitive_processes_interfaces.msg.ControlMsg
    episodes_topic: /main_loop/episodes
    episodes_msg: cognitive_node_interfaces.msg.Episode
    executed_policy_service: /simulator/executed_policy
    executed_policy_msg: cognitive_node_interfaces.srv.Policy
    world_reset_service: /simulator/world_reset
    world_reset_msg: cognitive_processes_interfaces.srv.WorldReset
LTM:
    Files:
        -
            id: goodness
            class: core.file.FileGoodness
            file: goodness.txt
        -
            id: pnodes_success
            class: core.file.FilePNodesSuccess
            file: pnodes_success.txt
        -
            id: pnodes_content
            class: core.file.FilePNodesContent
            file: pnodes_content.txt
        -
            id: trials
            class: core.file.FileTrialsSuccess
            file: trials.txt
    Connectors:
        -
            data: Space
            default_class: cognitive_nodes.space.Space
        -
            data: Perception
            default_class: cognitive_nodes.perception.Perception
        -
            data: PNode
            default_class: cognitive_nodes.pnode.PNode
            parameters:
                space_class: llm_planner.space.SemanticSpace      
        -
            data: CNode
            default_class: cognitive_nodes.cnode.CNode
        -
            data: Goal
            default_class: cognitive_nodes.goal.GoalLearnedSpace
        -
            data: WorldModel
            default_class: cognitive_nodes.world_model.WorldModel
        -
            data: Policy
            default_class: cognitive_nodes.policy.PolicyBlocking

    Nodes:
        Perception:
            -
                name: grasped_object
                class_name: llm_planner.perception.SemanticPerception
                parameters:
                    default_msg: std_msgs.msg.String
                    default_topic: /simulator/sensor/grasped_object
            -
                name: objects
                class_name: llm_planner.perception.SemanticPerception
                parameters:
                    default_msg: llm_planner_interfaces.msg.ObjectListMsg
                    default_topic: /simulator/sensor/objects
            -
                name: progress_object_in_place
                class_name: llm_planner.perception.SemanticPerception
                parameters:
                    default_msg: std_msgs.msg.Float32
                    default_topic: /simulator/sensor/progress
            -
                name: robot_vision
                class_name: llm_planner.perception.SemanticPerception
                parameters:
                    default_msg: sensor_msgs.msg.Image
                    default_topic: /simulator/sensor/robot_vision

        WorldModel:
            -
                name: PICK_AND_PLACE
                class_name: cognitive_nodes.world_model.WorldModel
                
        RobotPurpose:
            -
                name: object_in_place_mission
                class_name: cognitive_nodes.robot_purpose.RobotPurpose
                parameters:
                    weight: 1.0
                    drive_id: 'object_in_place_drive'
                    purpose_type: 'Mission'
                    terminal: True
            -
                name: user_alignment_need
                class_name: cognitive_nodes.robot_purpose.RobotPurpose
                parameters:
                    weight: 1.0
                    drive_id: 'user_alignment_drive'
                    purpose_type: 'Need'

        Drive:
            -
                name: object_in_place_drive
                class_name: cognitive_nodes.drive.DriveExponential
                parameters:
                    input_topic: /simulator/sensor/progress
                    input_msg: std_msgs.msg.Float32
                    min_eval: 0.9
                    neighbors: [{"name": "object_in_place_mission", "node_type": "RobotPurpose"}]
            -
                name: user_alignment_drive
                class_name: user_alignment.user_alignment.DriveUserAlignment
                parameters:
                    neighbors: [{"name": "user_alignment_need", "node_type": "RobotPurpose"}]

        Goal:
            -
                name: object_in_place_goal
                class_name: cognitive_nodes.goal.GoalMotiven
                parameters:
                    neighbors: [{"name": "object_in_place_drive", "node_type": "Drive"}]
            -
                name: screwdriver_in_toolbox_goal
                class_name: cognitive_nodes.goal.GoalMotiven
                parameters:
                    neighbors: [{"name": "object_in_place_drive", "node_type": "Drive"}]
            -
                name: user_alignment_goal
                class_name: cognitive_nodes.goal.GoalMotiven
                parameters:
                    neighbors: [{"name": "user_alignment_drive", "node_type": "Drive"}]

        PNode:
            -
                name: user_alignment_pnode
                class_name: dummy_nodes.dummy_pnodes.ActivatedDummyPNode
                parameters:
                    space_class: cognitive_nodes.space.ActivatedDummySpace
            -
                name: screwdriver_object_pnode
                class_name: llm_planner.pnode.SemanticPNode
                parameters:
                    target_object: "screwdriver"

        CNode:
            -
                name: screwdriver_object_cnode
                class_name: cognitive_nodes.cnode.CNode
                parameters:
                    neighbors: [{"name": "screwdriver_in_toolbox_goal", "node_type": "Goal"}, 
                               {"name": "PICK_AND_PLACE", "node_type": "WorldModel"}, 
                               {"name": "screwdriver_object_pnode", "node_type": "PNode"}]
            -
                name: user_alignment_cnode
                class_name: cognitive_nodes.cnode.CNode
                parameters:
                    neighbors: [{"name": "user_alignment_goal", "node_type": "Goal"}, 
                               {"name": "PICK_AND_PLACE", "node_type": "WorldModel"}, 
                               {"name": "user_alignment_pnode", "node_type": "PNode"}]

        Policy:
            -
                name: grasp_mug_body
                class_name: cognitive_nodes.policy.PolicyBlocking
                parameters:
                    service_msg: cognitive_node_interfaces.srv.Policy
                    service_name: /simulator/executed_policy
            - 
                name: grasp_screwdriver_handle
                class_name: cognitive_nodes.policy.PolicyBlocking
                parameters:
                    service_msg: cognitive_node_interfaces.srv.Policy
                    service_name: /simulator/executed_policy
            -
                name: grasp_banana_body
                class_name: cognitive_nodes.policy.PolicyBlocking
                parameters:
                    service_msg: cognitive_node_interfaces.srv.Policy
                    service_name: /simulator/executed_policy
            -
                name: grasp_scissors_handle
                class_name: cognitive_nodes.policy.PolicyBlocking
                parameters:
                    service_msg: cognitive_node_interfaces.srv.Policy
                    service_name: /simulator/executed_policy
            -
                name: release_on_table
                class_name: cognitive_nodes.policy.PolicyBlocking
                parameters:
                    service_msg: cognitive_node_interfaces.srv.Policy
                    service_name: /simulator/executed_policy
            -
                name: release_on_shelf
                class_name: cognitive_nodes.policy.PolicyBlocking
                parameters:
                    service_msg: cognitive_node_interfaces.srv.Policy
                    service_name: /simulator/executed_policy
            -
                name: release_in_trash
                class_name: cognitive_nodes.policy.PolicyBlocking
                parameters:
                    service_msg: cognitive_node_interfaces.srv.Policy
                    service_name: /simulator/executed_policy
            -
                name: release_in_toolbox
                class_name: cognitive_nodes.policy.PolicyBlocking
                parameters:
                    service_msg: cognitive_node_interfaces.srv.Policy
                    service_name: /simulator/executed_policy
            -
                name: user_alignment_policy
                class_name: user_alignment.user_alignment.PolicyUserAlignment
                parameters:
                    ltm_id: ltm_0
                    prompts: ???
            -
                name: llm_planner_policy
                class_name: llm_planner.policy_llm_planner.PolicyLLMPlanner
                parameters:
                    llm_model_name: "llama3.2"
                    neighbors: [{"name": "llm_planner_cnode", "node_type": "CNode"}]
                    ltm_id: ltm_0
                    prompts :
                        high_level_prompt: |
                            You are in charge of a fixed robotic arm ending in a gripper. Your task is the following: {task}
                            Please output a plan, composed of a grasp action and a place action, to carry out this task. You can assume that simple actions (such as grasping or handing objects) automatically move the arm to the correct position, so you should avoid actions such as 'move to...'.

                            Please only output the plan as a tuple of strings, where each step is a string. And output no other text.

                        low_level_prompt: |
                            Context:
                            You are now in charge of a mobile robot equipped with one arm with a parallel gripper. You will be given a high-level task that you will need to fullfill using this robot, and the corresponding plan, which is a series of simpler steps. You will need to carry out the task step by step by interacting with the system using some code primitives. At each step the plan will be updated and you will receive feedback.
                            The skills are python functions, which allow you to perceive and act on your environment.

                            Skills:
                            Here are the functions and skills, with examples of the syntax:

                            grasp_mug_body_policy()
                                """Grasp a mug from the body."""

                            grasp_screwdriver_handle_policy()
                                """Grasp a screwdriver from the handle"""

                            grasp_banana_body_policy()
                                """Grasp a banana from the body"""

                            grasp_scissors_handle_policy()
                                """Grasp scissors from the handle"""

                            release_on_table_policy()
                                """Go to the pose for releasing an object in location = table"""

                            release_in_trash_policy()
                                """Go to the pose for releasing an object in location = trash"""

                            release_on_shelf_policy()
                                """Go to the pose for releasing an object in location = shelf"""

                            release_in_toolbox_policy()
                                """Go to the pose for releasing an object in location = toolbox"""

                            Examples of syntax: 
                                - grasp_scissors_handle_policy()
                                - release_on_shelf_policy()


                            The task and the plan:
                            You are in charge of executing the following task: {task}. The plan is: {plan}.
                            Here are the expected outcomes of each step in the plan, which you can use as a guide:
                            {EO}

                            What I need you to do:
                            Please output a python-style list, which will contain the necessary associated skill for each step of the plan. Each item of the list will be a string corresponding one of the available skills. Return only the list and output no other text.

                        outcome_prompt: |
                            You are in charge of executing the following task: {task}. The plan consists of the following steps: {plan}. Each of the steps of the plan will be executed with a mobile robot equipped with an arm ending in a gripper. For each step of the plan, I need you to give the expected outcome of the actions involved in the step, in physical and visual terms.
                            This should consist of one or two short, simple sentences that are a more complete and detailed description of the step's outcome. The sentences should describe the final state of the robot, for example if it should be at a location, have grasped an object (and what part of the object, if relevant for the task), or where an object should be put down. You can add some information if the plan is too concise. Here are some examples, with the plan step first and the expected outcome after:
                            - Put bottle on shelf: The bottle should be on the shelf.
                            - Grasp the mug: The mug should be in the robot's gripper.
                            For each step of the plan, please briefly describe the expected outcome as shown above. Return the expected outcomes as a python-style dictionary and output no other text.


DiscreteEventSimulator:
    Perceptions:
        -
            name: grasped_object
            perception_topic: /simulator/sensor/grasped_object
            perception_msg: std_msgs.msg.String
        -
            name: objects
            perception_topic: /simulator/sensor/objects
            perception_msg: llm_planner_interfaces.msg.ObjectListMsg
        -
            name: progress_object_in_place
            perception_topic: /simulator/sensor/progress
            perception_msg: std_msgs.msg.Float32
        -
            name: robot_vision
            perception_topic: /simulator/sensor/robot_vision
            perception_msg: sensor_msgs.msg.Image

    Objects:
        - 
            id: 'screwdriver'
            location: 'table'
            home: 'toolbox'
            subparts:
                - 'handle'
                - 'shaft' 
        - 
            id: 'banana'
            location: 'table'
            home: 'trash'
            subparts:
                - 'body'
        - 
            id: 'mug'
            location: 'table'
            home: 'shelf'
            subparts:
                - 'handle'
                - 'body'
        - 
            id: 'scissors'
            location: 'table'
            home: 'toolbox'
            subparts: 
                - 'handle'
                - 'blade'
